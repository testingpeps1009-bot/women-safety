<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafeGuard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:       #ef233c;
    --red-soft:  #fff0f2;
    --green:     #2dc653;
    --green-soft:#f0fdf4;
    --amber:     #f4a118;
    --amber-soft:#fffbeb;
    --blue:      #3a86ff;
    --blue-soft: #eff6ff;
    --bg:        #f8f9fc;
    --card:      #ffffff;
    --border:    #e8eaef;
    --text:      #0d0d0d;
    --sub:       #6b7280;
    --font:      'Plus Jakarta Sans', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto;padding:0 0 48px}

  /* Top Bar */
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-icon{width:34px;height:34px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .brand-name{font-size:17px;font-weight:800;letter-spacing:-0.4px}
  .brand-name span{color:var(--red)}
  .live-pill{display:flex;align-items:center;gap:5px;background:var(--green-soft);border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--green)}
  .live-pill.waiting{background:#f3f4f6;border-color:#e5e7eb;color:var(--sub)}
  .live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pdot 2s infinite}
  .live-pill.waiting .live-dot{animation:none}
  @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

  /* Content */
  .content{padding:20px}

  /* Alert Banner */
  .alert-banner{border-radius:16px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;background:var(--green-soft);border:1.5px solid #bbf7d0;transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}
  .alert-banner.triggered{background:var(--red-soft);border-color:#fca5a5;animation:bshake 0.5s ease}
  @keyframes bshake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-3px)}60%{transform:translateX(3px)}}
  .banner-icon{font-size:26px;flex-shrink:0}
  .banner-title{font-size:15px;font-weight:700}
  .banner-sub{font-size:12px;color:var(--sub);margin-top:2px}

  /* Vitals */
  .vitals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .vital{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px 14px;position:relative;overflow:hidden}
  .vital-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
  .vital.hr   .vital-accent{background:linear-gradient(90deg,var(--red),#ff6b81)}
  .vital.temp .vital-accent{background:linear-gradient(90deg,var(--amber),#fbbf24)}
  .vital-label{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px}
  .vital-num{font-size:46px;font-weight:800;letter-spacing:-3px;line-height:1;margin-bottom:4px}
  .vital.hr   .vital-num{color:var(--red)}
  .vital.temp .vital-num{color:var(--amber)}
  .vital-unit{font-size:12px;font-weight:500;color:var(--sub)}

  /* Info Cards */
  .info-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:12px}
  .info-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .info-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .info-val{font-size:13px;font-weight:600;color:var(--text);word-break:break-all;line-height:1.5}
  .info-val.active{color:var(--blue)}
  .info-val.muted{color:var(--sub);font-weight:400}
  .gps-badge{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--blue-soft);color:var(--blue);border:1px solid #bfdbfe;white-space:nowrap}
  .gps-badge.waiting{background:#f3f4f6;color:var(--sub);border-color:#e5e7eb}

  /* How it works note */
  .note{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:#92400e;line-height:1.5}
  .note strong{display:block;margin-bottom:3px;font-size:12px}

  /* SOS */
  .sos-btn{width:100%;padding:20px;background:var(--red);color:#fff;border:none;border-radius:16px;font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:1.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(239,35,60,0.35);transition:transform 0.1s,opacity 0.2s;position:relative;overflow:hidden;margin-bottom:8px}
  .sos-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%)}
  .sos-btn:active{transform:scale(0.97)}
  .sos-btn.loading{opacity:0.65;pointer-events:none}
  .sos-hint{text-align:center;font-size:11px;color:var(--sub);margin-bottom:14px}

  /* Clear */
  .clear-btn{width:100%;padding:13px;background:transparent;color:var(--sub);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-bottom:18px}
  .clear-btn:active{background:var(--bg)}

  /* Sync */
  .sync-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--sub);margin-bottom:18px}

  /* Log */
  .log-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .log-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .log-head-title{font-size:13px;font-weight:700}
  .log-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--sub)}
  .log-body{max-height:220px;overflow-y:auto;padding:6px 0}
  .log-body::-webkit-scrollbar{width:3px}
  .log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .log-entry{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);animation:fslide 0.25s ease}
  .log-entry:last-child{border-bottom:none}
  @keyframes fslide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .log-time{font-size:10px;color:var(--sub);white-space:nowrap;padding-top:2px;font-weight:500}
  .log-text{font-size:12px;font-weight:600;flex:1;line-height:1.4}
  .log-text.ok  {color:var(--green)}
  .log-text.warn{color:var(--red)}
  .log-text.info{color:var(--text)}
  .log-empty{padding:24px 16px;text-align:center;font-size:12px;color:var(--sub)}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:11px 20px;border-radius:40px;font-size:13px;font-weight:600;white-space:nowrap;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.2);pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.ok {background:var(--green)}
  .toast.err{background:var(--red)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <div class="brand-name">Safe<span>Guard</span></div>
  </div>
  <div class="live-pill waiting" id="livePill">
    <div class="live-dot"></div>
    <span id="liveText">Connecting</span>
  </div>
</div>

<div class="content">

  <div class="alert-banner" id="alertBanner">
    <div class="banner-icon" id="bannerIcon">✅</div>
    <div>
      <div class="banner-title" id="bannerTitle">All Systems Normal</div>
      <div class="banner-sub"  id="bannerSub">Device is monitoring</div>
    </div>
  </div>

  <div class="vitals">
    <div class="vital hr">
      <div class="vital-accent"></div>
      <div class="vital-label">❤ Heart Rate</div>
      <div class="vital-num" id="hrVal">--</div>
      <div class="vital-unit">beats / min</div>
    </div>
    <div class="vital temp">
      <div class="vital-accent"></div>
      <div class="vital-label">◈ Temperature</div>
      <div class="vital-num" id="tempVal">--</div>
      <div class="vital-unit">°C</div>
    </div>
  </div>

  <div class="info-card">
    <div class="info-label">◎ GPS Location</div>
    <div class="info-row">
      <div class="info-val muted" id="gpsVal">Requesting location...</div>
      <div class="gps-badge waiting" id="gpsBadge">Waiting</div>
    </div>
  </div>

  <button class="sos-btn" id="sosBtn" onclick="triggerSOS()">🆘 SOS EMERGENCY</button>
  <div class="sos-hint">ESP32 will send SMS to emergency contact instantly</div>

  <button class="clear-btn" onclick="clearAlert()">✓ &nbsp;Clear Alert</button>

  <div class="sync-row">🔄 <span id="syncTime">Waiting for device data...</span></div>

  <div class="log-wrap">
    <div class="log-head">
      <div class="log-head-title">Activity Log</div>
      <div class="log-badge" id="logBadge">0 events</div>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">No activity yet</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey:      "AIzaSyAfIZ0xR3pzZz_uXHbTSLL_cm1S6KjTwxc",
  authDomain:  "women-safety-device-89b8e.firebaseapp.com",
  databaseURL: "https://women-safety-device-89b8e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:   "women-safety-device-89b8e",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let totalEvents = 0;

// ── Toast ──────────────────────────────────────────────────
function showToast(msg, type="") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show "+type;
  setTimeout(() => el.className="toast", 3200);
}

// ── Log ────────────────────────────────────────────────────
function addLog(msg, type="info") {
  const body = document.getElementById("logBody");
  const empty = body.querySelector(".log-empty");
  if (empty) empty.remove();
  const t = new Date().toLocaleTimeString("en-IN",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const el = document.createElement("div");
  el.className = "log-entry";
  el.innerHTML = `<div class="log-time">${t}</div><div class="log-text ${type}">${msg}</div>`;
  body.prepend(el);
  while (body.children.length > 30) body.removeChild(body.lastChild);
  totalEvents++;
  document.getElementById("logBadge").textContent = totalEvents+(totalEvents===1?" event":" events");
}

// ── GPS — push to Firebase so ESP32 includes in SMS ────────
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById("gpsVal").textContent = "GPS not supported";
    return;
  }
  function onPos(pos) {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    document.getElementById("gpsVal").textContent = `${lat}, ${lng}`;
    document.getElementById("gpsVal").className   = "info-val active";
    document.getElementById("gpsBadge").textContent = "Active";
    document.getElementById("gpsBadge").className   = "gps-badge";
    set(ref(db, "/location"), { latitude:parseFloat(lat), longitude:parseFloat(lng), updatedAt:Date.now() });
  }
  function onErr() {
    document.getElementById("gpsVal").textContent = "Allow location → reload page";
    document.getElementById("gpsVal").className   = "info-val muted";
  }
  navigator.geolocation.getCurrentPosition(onPos, onErr, {enableHighAccuracy:true,timeout:10000});
  navigator.geolocation.watchPosition(onPos, onErr, {enableHighAccuracy:true,maximumAge:5000});
}

// ── Sensor data ────────────────────────────────────────────
onValue(ref(db,"/sensor/heartrate"), snap => {
  const v = snap.val();
  document.getElementById("hrVal").textContent = v > 0 ? v : "--";
  document.getElementById("syncTime").textContent = "Last sync: "+new Date().toLocaleTimeString("en-IN",{hour12:false});
  document.getElementById("livePill").className = "live-pill";
  document.getElementById("liveText").textContent = "Live";
});
onValue(ref(db,"/sensor/temperature"), snap => {
  const v = snap.val();
  document.getElementById("tempVal").textContent = v > 0 ? parseFloat(v).toFixed(1) : "--";
});

// ── Alert listeners — ESP32 writes these, we just show them ─
const ALERTS = {
  sos:        {icon:"🚨",title:"SOS ALERT",          sub:"Emergency button pressed"},
  threat:     {icon:"⚠️", title:"THREAT DETECTED",    sub:"Sudden approach detected"},
  tamper:     {icon:"🔓",title:"TAMPER ALERT",        sub:"Device may be removed"},
  tempAlert:  {icon:"🌡", title:"HIGH TEMPERATURE",   sub:"Body temp dangerously high"},
  heartAlert: {icon:"💓",title:"ABNORMAL HEART RATE", sub:"HR outside safe range"},
};
Object.keys(ALERTS).forEach(key => {
  onValue(ref(db,"/alerts/"+key), snap => {
    if (snap.val() !== true) return;
    const a = ALERTS[key];
    document.getElementById("alertBanner").className = "alert-banner triggered";
    document.getElementById("bannerIcon").textContent  = a.icon;
    document.getElementById("bannerTitle").textContent = a.title;
    document.getElementById("bannerSub").textContent   = a.sub;
    addLog(a.icon+" "+a.title+" — ESP32 sending SMS", "warn");
    if (navigator.vibrate) navigator.vibrate([300,100,300,100,600]);
  });
});

// ── SOS button — writes to Firebase, ESP32 picks it up & sends SMS
window.triggerSOS = function() {
  if (!confirm("Send SOS Emergency Alert?\nESP32 will SMS +919360856505 immediately.")) return;
  const btn = document.getElementById("sosBtn");
  btn.innerHTML = "⏳ &nbsp;Sending...";
  btn.classList.add("loading");

  // Write to Firebase — ESP32 reads this in its loop and sends SMS
  set(ref(db,"/alerts/sos"), true);
  set(ref(db,"/alerts/alertType"), "SOS");
  set(ref(db,"/alerts/timestamp"), Math.floor(Date.now()/1000));

  addLog("🚨 SOS triggered — ESP32 will send SMS", "warn");
  showToast("🚨 Alert sent to ESP32", "ok");

  setTimeout(() => {
    btn.innerHTML = "🆘 SOS EMERGENCY";
    btn.classList.remove("loading");
  }, 3500);
};

// ── Clear ──────────────────────────────────────────────────
window.clearAlert = function() {
  Object.keys(ALERTS).forEach(k => set(ref(db,"/alerts/"+k), false));
  document.getElementById("alertBanner").className = "alert-banner";
  document.getElementById("bannerIcon").textContent  = "✅";
  document.getElementById("bannerTitle").textContent = "All Systems Normal";
  document.getElementById("bannerSub").textContent   = "Device is monitoring";
  addLog("✓ Alert cleared", "ok");
  showToast("Alert cleared", "ok");
};

startGPS();
addLog("Dashboard connected", "ok");
</script>
</body>
</html>
