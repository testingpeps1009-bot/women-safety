<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Women Safety Device</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#1a1a2e;color:white;min-height:100vh;padding:16px}
    h1{text-align:center;color:#e94560;font-size:20px;letter-spacing:2px;padding:16px 0 4px}
    .sub{text-align:center;color:#aaa;font-size:11px;margin-bottom:16px}
    .status{text-align:center;padding:14px;border-radius:12px;font-size:15px;font-weight:bold;
            border:2px solid #00b894;color:#00b894;margin-bottom:14px}
    .status.alert{border-color:#e94560;color:#e94560;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .card{background:#16213e;border-radius:12px;padding:16px;border-left:4px solid #e94560}
    .card.green{border-left-color:#00b894}
    .label{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .val{font-size:38px;font-weight:bold;color:#e94560}
    .card.green .val{color:#00b894}
    .unit{font-size:13px;color:#aaa;margin-left:4px}
    .loccard{background:#16213e;border-radius:12px;padding:14px;border-left:4px solid #0984e3;margin-bottom:12px}
    .loccard .label{color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .locval{font-size:13px;color:#0984e3;word-break:break-all}
    .gps-tip{font-size:11px;color:#aaa;text-align:center;margin-bottom:12px}
    .sos-btn{width:100%;padding:22px;background:#e94560;color:white;border:none;border-radius:12px;
             font-size:22px;font-weight:bold;letter-spacing:2px;cursor:pointer;margin-bottom:10px;
             box-shadow:0 0 24px rgba(233,69,96,.5)}
    .sos-btn:active{transform:scale(.97)}
    .clear-btn{width:100%;padding:14px;background:#00b894;color:white;border:none;border-radius:12px;
               font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:12px}
    .log{background:#16213e;border-radius:12px;padding:14px;max-height:160px;overflow-y:auto}
    .log-title{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .log-item{font-size:12px;padding:5px 0;border-bottom:1px solid #0f3460;color:#ddd}
    .log-item:last-child{border:none}
    .ts{font-size:10px;color:#555;margin-bottom:14px;text-align:center}
    .sms-sent{background:#0f3460;border-radius:8px;padding:8px 12px;font-size:12px;
              color:#74b9ff;margin-bottom:10px;display:none}
  </style>
</head>
<body>

<h1>🛡️ WOMEN SAFETY</h1>
<p class="sub">Real-time monitoring dashboard</p>

<div id="statusBox" class="status">✅ Status: Normal</div>
<div id="smsSent" class="sms-sent">📱 SMS sent to emergency contact</div>

<div class="grid">
  <div class="card">
    <div class="label">❤️ Heart Rate</div>
    <span class="val" id="hrVal">--</span><span class="unit">BPM</span>
  </div>
  <div class="card green">
    <div class="label">🌡️ Temperature</div>
    <span class="val" id="tempVal">--</span><span class="unit">°C</span>
  </div>
</div>

<div class="loccard">
  <div class="label">📍 Your Location (GPS)</div>
  <div class="locval" id="locVal">Waiting for GPS...</div>
</div>
<p class="gps-tip" id="gpsTip">Open this page in Chrome browser for GPS to work</p>

<button class="sos-btn" onclick="triggerSOS()">🆘 SOS EMERGENCY</button>
<button class="clear-btn" onclick="clearAlert()">✅ Clear Alert</button>

<div class="ts" id="lastUpdate">Last update: --</div>

<div class="log">
  <div class="log-title">Alert History</div>
  <div id="logList"><div class="log-item" style="color:#555">No alerts yet</div></div>
</div>

<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get }    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// ── Firebase config ──────────────────────────────────────────
const firebaseConfig = {
  apiKey:      "AIzaSyAfIZ0xR3pzZz_uXHbTSLL_cm1S6KjTwxc",
  authDomain:  "women-safety-device-89b8e.firebaseapp.com",
  databaseURL: "https://women-safety-device-89b8e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:   "women-safety-device-89b8e",
};

// ── Twilio config (SMS sent from this browser page) ──────────
const TWILIO_SID   = "ACcc036f70be02d574426f134d8d5c0afd";
const TWILIO_TOKEN = "e4da909f793878dc0fc414f90c20dd36";
const TWILIO_FROM  = "+19789513308";
const TWILIO_TO    = "+919384210599";

// ── State ────────────────────────────────────────────────────
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
let curLat = null, curLng = null;
let lastAlertTime = {};
const SMS_COOLDOWN = 30000; // 30s between same alert type

// ── Twilio SMS via fetch (browser → Twilio API) ───────────────
async function sendTwilioSMS(alertType, hr, temp) {
  const now = Date.now();
  if (lastAlertTime[alertType] && now - lastAlertTime[alertType] < SMS_COOLDOWN) return;
  lastAlertTime[alertType] = now;

  let msg = "";
  if      (alertType === "sos")        msg = "🚨 SOS EMERGENCY! ";
  else if (alertType === "threat")     msg = "⚠️ THREAT DETECTED! Someone approaching! ";
  else if (alertType === "tempAlert")  msg = "🌡️ HIGH TEMPERATURE ALERT! ";
  else if (alertType === "heartAlert") msg = "💓 ABNORMAL HEART RATE! ";

  msg += `HR: ${hr} BPM | Temp: ${temp}°C`;
  if (curLat && curLng) msg += ` | Location: https://maps.google.com/?q=${curLat},${curLng}`;
  else msg += " | Location: Open dashboard on phone for GPS";

  const body = new URLSearchParams({ To: TWILIO_TO, From: TWILIO_FROM, Body: msg });

  try {
    const resp = await fetch(
      `https://api.twilio.com/2010-04-01/Accounts/${TWILIO_SID}/Messages.json`,
      {
        method: "POST",
        headers: {
          "Authorization": "Basic " + btoa(`${TWILIO_SID}:${TWILIO_TOKEN}`),
          "Content-Type":  "application/x-www-form-urlencoded",
        },
        body: body.toString(),
      }
    );
    if (resp.status === 201) {
      document.getElementById("smsSent").style.display = "block";
      setTimeout(() => document.getElementById("smsSent").style.display = "none", 5000);
      addLog("📱 SMS sent: " + alertType.toUpperCase());
    } else {
      const txt = await resp.text();
      console.warn("Twilio error:", txt);
      addLog("❌ SMS failed: " + resp.status);
    }
  } catch(e) {
    console.warn("Twilio fetch error:", e);
    addLog("❌ SMS error: " + e.message);
  }
}

// ── Log helper ────────────────────────────────────────────────
function addLog(msg) {
  const el = document.getElementById("logList");
  if (el.children[0]?.style.color === "rgb(85, 85, 85)") el.innerHTML = "";
  const div = document.createElement("div");
  div.className = "log-item";
  div.textContent = new Date().toLocaleTimeString() + " — " + msg;
  el.prepend(div);
  while (el.children.length > 20) el.removeChild(el.lastChild);
}

// ── GPS ───────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById("locVal").textContent = "GPS not supported";
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      curLat = pos.coords.latitude.toFixed(6);
      curLng = pos.coords.longitude.toFixed(6);
      document.getElementById("locVal").textContent = `${curLat}, ${curLng}`;
      document.getElementById("gpsTip").textContent = "✅ GPS active — location will be in SMS";
      set(ref(db, "/location"), {
        latitude:  parseFloat(curLat),
        longitude: parseFloat(curLng),
        updatedAt: Date.now(),
      });
    },
    err => {
      document.getElementById("locVal").textContent = "GPS error: " + err.message;
      document.getElementById("gpsTip").textContent = "⚠️ Allow location permission in browser";
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

// ── Listen: sensor data ───────────────────────────────────────
let curHR = "--", curTemp = "--";
onValue(ref(db, "/sensor/heartrate"), snap => {
  const v = snap.val();
  curHR = v > 0 ? v : "--";
  document.getElementById("hrVal").textContent = curHR;
  document.getElementById("lastUpdate").textContent = "Last update: " + new Date().toLocaleTimeString();
});
onValue(ref(db, "/sensor/temperature"), snap => {
  const v = snap.val();
  curTemp = v > 0 ? parseFloat(v).toFixed(1) : "--";
  document.getElementById("tempVal").textContent = curTemp;
});

// ── Listen: alerts from ESP32 ─────────────────────────────────
const alertLabels = {
  sos:        "🚨 SOS ALERT!",
  threat:     "⚠️ THREAT DETECTED!",
  tempAlert:  "🌡️ HIGH TEMP ALERT!",
  heartAlert: "💓 HEART RATE ALERT!",
};

Object.keys(alertLabels).forEach(alertType => {
  onValue(ref(db, "/alerts/" + alertType), async snap => {
    if (snap.val() !== true) return;
    const box = document.getElementById("statusBox");
    box.textContent = alertLabels[alertType];
    box.className   = "status alert";
    addLog(alertLabels[alertType]);

    // Vibrate phone
    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);

    // Send SMS via Twilio
    await sendTwilioSMS(alertType, curHR, curTemp);
  });
});

// ── SOS button ────────────────────────────────────────────────
window.triggerSOS = async function() {
  if (!confirm("Send SOS Emergency Alert?")) return;
  await set(ref(db, "/alerts/sos"), true);
  document.getElementById("statusBox").textContent = "🚨 SOS SENT!";
  document.getElementById("statusBox").className   = "status alert";
  addLog("🚨 Manual SOS triggered");
  await sendTwilioSMS("sos", curHR, curTemp);
};

// ── Clear alert ───────────────────────────────────────────────
window.clearAlert = async function() {
  await set(ref(db, "/alerts/sos"),        false);
  await set(ref(db, "/alerts/threat"),     false);
  await set(ref(db, "/alerts/tempAlert"),  false);
  await set(ref(db, "/alerts/heartAlert"), false);
  document.getElementById("statusBox").textContent = "✅ Status: Normal";
  document.getElementById("statusBox").className   = "status";
  addLog("✅ Alert cleared");
};

// ── Start ─────────────────────────────────────────────────────
startGPS();
</script>
</body>
</html>
